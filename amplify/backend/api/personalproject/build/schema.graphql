}

type Subscription {
  onCreateTask(filter: ModelSubscriptionTaskFilterInput, owner: String): Task @aws_subscribe(mutations: ["createTask"])
  onUpdateTask(filter: ModelSubscriptionTaskFilterInput, owner: String): Task @aws_subscribe(mutations: ["updateTask"])
  onDeleteTask(filter: ModelSubscriptionTaskFilterInput, owner: String): Task @aws_subscribe(mutations: ["deleteTask"])
  onCreateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["createUser"])
  onUpdateUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["updateUser"])
  onDeleteUser(filter: ModelSubscriptionUserFilterInput, owner: String): User @aws_subscribe(mutations: ["deleteUser"])
  onCreateSubject(filter: ModelSubscriptionSubjectFilterInput, owner: String): Subject @aws_subscribe(mutations: ["createSubject"])
  onUpdateSubject(filter: ModelSubscriptionSubjectFilterInput, owner: String): Subject @aws_subscribe(mutations: ["updateSubject"])
  onDeleteSubject(filter: ModelSubscriptionSubjectFilterInput, owner: String): Subject @aws_subscribe(mutations: ["deleteSubject"])
  onCreateTopic(filter: ModelSubscriptionTopicFilterInput, owner: String): Topic @aws_subscribe(mutations: ["createTopic"])
  onUpdateTopic(filter: ModelSubscriptionTopicFilterInput, owner: String): Topic @aws_subscribe(mutations: ["updateTopic"])
  onDeleteTopic(filter: ModelSubscriptionTopicFilterInput, owner: String): Topic @aws_subscribe(mutations: ["deleteTopic"])
}

